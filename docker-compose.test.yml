services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: crawldoctor
      POSTGRES_USER: crawldoctor
      POSTGRES_PASSWORD: crawldoctor_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawldoctor -d crawldoctor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CrawlDoctor Backend Only
  crawldoctor:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CRAWLDOCTOR_DATABASE_URL: "postgresql://crawldoctor:crawldoctor_password@postgres:5432/crawldoctor"
      CRAWLDOCTOR_REDIS_URL: "memory://localhost"
      CRAWLDOCTOR_SECRET_KEY: "dev-secret-key-change-in-production"
      CRAWLDOCTOR_DEBUG: "true"
      CRAWLDOCTOR_ENVIRONMENT: "development"
      CRAWLDOCTOR_CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
